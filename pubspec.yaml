name: hrms_mobile
description: "HRMS Employee Mobile App - Attendance, Leave, Payroll, Performance & Loans"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  flutter_animate: ^4.5.2

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.8.1

  # Data & Formatting
  intl: any
  uuid: ^4.5.1

  # Charts
  fl_chart: ^0.70.2

  # Storage
  shared_preferences: ^2.3.4

  # Networking (for future real backend)
  http: ^1.2.2

  # GPS & Location
  geolocator: ^13.0.2

  # Maps
  google_maps_flutter: ^2.10.1

  # Utilities
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
